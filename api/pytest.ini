[pytest]
# pytest-asyncio detecta automáticamente funciones async y las corre con asyncio.
# Sin esto, los tests async fallan con "coroutine never awaited".
# Pytest no soporta asyncio nativamente, así que pytest-asyncio es necesario para tests async.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Marcadores custom para separar unit tests de integration tests en CI.
# Uso: pytest -m "not integration"   → solo unit tests (rápido, sin DB)
#      pytest -m integration          → solo integration tests (necesita DB)
markers =
    integration: requiere servicios externos (PostgreSQL, red)
    e2e: flujo completo sin mocks (requiere scanner Go + DB + red)
