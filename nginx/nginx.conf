# Configuración de Nginx como reverse proxy para mail-analyzer.
# Nginx recibe TODO el tráfico externo y lo reenvía internamente a los servicios.

# --- Rate limiting ---
# Define una zona de memoria compartida llamada "api_limit".
# Usa la IP del cliente ($binary_remote_addr) como clave.
# 10m = 10MB de memoria para almacenar IPs (~160,000 IPs).
# rate=10r/s = máximo 10 requests por segundo por IP.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;  # Acepta cualquier dominio (cuando tengas dominio real, ponés el nombre aquí)

    # --- Límites de seguridad ---
    client_max_body_size 1m;  # Rechaza bodies mayores a 1MB (protege contra payloads gigantes)

    # --- Headers de seguridad ---
    add_header X-Content-Type-Options "nosniff" always;      # Evita que el browser adivine el tipo de contenido
    add_header X-Frame-Options "DENY" always;                # Evita que tu API se cargue en un iframe (clickjacking)
    add_header X-XSS-Protection "1; mode=block" always;      # Activa filtro XSS del browser

    # --- Proxy hacia la API (FastAPI) ---
    location /v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        # burst=20: permite ráfagas de hasta 20 requests antes de rechazar
        # nodelay: los requests del burst se procesan inmediatamente, no se encolan

        proxy_pass http://api:8000;  # "api" es el nombre del servicio en docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;  # Le dice a tu API la IP real del cliente
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health check de la API (sin rate limit) ---
    location /v1/health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Bloquear todo lo demás ---
    location / {
        return 404 '{"error": "not found"}';
        add_header Content-Type application/json;
    }
}
