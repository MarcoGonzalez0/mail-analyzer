# Override de PRODUCCIÓN — se usa explícitamente:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    # Sobreescribe el CMD del Dockerfile: quita --reload y agrega workers
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    environment:
      ENVIRONMENT: production
    restart: always

  db:
    restart: always

  scanner:
    restart: always
