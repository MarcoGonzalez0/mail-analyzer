# Override de PRODUCCIÓN — se usa explícitamente:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    environment:
      ENVIRONMENT: production
    ports: !override []  # CIERRA el puerto 8000 al exterior — solo Nginx puede hablarle
    restart: always

  scanner:
    ports: !override []  # CIERRA el puerto 8080 al exterior
    restart: always

  db:
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"  # El ÚNICO puerto expuesto al exterior
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # ro = read-only
    depends_on:
      api:
        condition: service_healthy
    restart: always
