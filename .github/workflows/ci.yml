name: CI

# ¿Cuándo corre este workflow?
# - En cada push a main
# - En cada Pull Request que apunta a main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  tests-python:
    name: Tests Python
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # Los tests unitarios no tocan la DB — valores placeholder para
      # que Pydantic Settings y Docker Compose no fallen al leer variables.
      - name: Crear .env para CI
        run: |
          echo "POSTGRES_USER=placeholder"     > .env
          echo "POSTGRES_PASSWORD=placeholder" >> .env
          echo "POSTGRES_DB=placeholder"       >> .env

      - name: Construir imagen API
        run: docker compose build api

      # --no-deps → no levanta DB ni scanner
      # --rm      → elimina el contenedor al terminar
      - name: Correr tests
        run: docker compose run --no-deps --rm api pytest tests/ -v


  tests-go:
    name: Tests Go
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # En Linux no hay problema con rutas como en Git Bash de Windows.
      # Usamos la imagen oficial de Go para tener el compilador disponible.
      # -short salta los tests de integración que necesitan DNS real.
      - name: Correr tests
        run: docker run --rm -v "${{ github.workspace }}/scanner:/app" -w /app golang:1.23 go test ./... -v -short
